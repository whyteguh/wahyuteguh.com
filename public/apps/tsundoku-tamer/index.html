<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tsundoku Tamer</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS via CDN. Palette bound to CSS variables so every class
         (bg-cream, text-charcoal, bg-earth/5, …) follows the site theme. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: 'rgb(var(--c-cream) / <alpha-value>)',
                        'cream-dark': 'rgb(var(--c-cream-dark) / <alpha-value>)',
                        earth: 'rgb(var(--c-earth) / <alpha-value>)',
                        'earth-light': 'rgb(var(--c-earth-light) / <alpha-value>)',
                        'earth-dark': 'rgb(var(--c-earth-dark) / <alpha-value>)',
                        charcoal: 'rgb(var(--c-charcoal) / <alpha-value>)',
                        'charcoal-mid': 'rgb(var(--c-charcoal-mid) / <alpha-value>)',
                        stone: 'rgb(var(--c-stone) / <alpha-value>)',
                        accent: 'rgb(var(--c-accent) / <alpha-value>)',
                        surface: 'rgb(var(--c-surface) / <alpha-value>)',
                    },
                    fontFamily: {
                        serif: ['Caveat', 'cursive'],
                        hand: ['Caveat', 'cursive'],
                        sans: ['Courier Prime', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel to transpile JSX in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --c-cream: 251 250 246;
            --c-cream-dark: 240 235 225;
            --c-earth: 139 111 71;
            --c-earth-light: 196 168 130;
            --c-earth-dark: 92 69 48;
            --c-charcoal: 43 41 37;
            --c-charcoal-mid: 74 69 64;
            --c-stone: 154 147 144;
            --c-accent: 179 67 43;
            --c-surface: 255 255 255;
        }

        html.dark {
            --c-cream: 27 25 21;
            --c-cream-dark: 69 63 52;
            --c-earth: 196 168 130;
            --c-earth-light: 214 190 150;
            --c-earth-dark: 214 190 150;
            --c-charcoal: 230 225 211;
            --c-charcoal-mid: 164 157 141;
            --c-stone: 124 118 106;
            --c-accent: 224 122 95;
            --c-surface: 55 51 43;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background-color: rgb(var(--c-cream));
            color: rgb(var(--c-charcoal));
            background-image: radial-gradient(circle, rgba(139, 111, 71, 0.18) 1px, transparent 1.2px);
            background-size: 22px 22px;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        html.dark body {
            background-image: radial-gradient(circle, rgba(196, 168, 130, 0.12) 1px, transparent 1.2px);
        }

        .serif { font-family: 'Caveat', cursive; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgb(var(--c-cream)); }
        ::-webkit-scrollbar-thumb { background: rgb(var(--c-cream-dark)); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--c-stone)); }
    </style>

    <!-- Theme: follow the parent site's mode (same-origin localStorage 'wt-mode') -->
    <script>
        function applyTheme() {
            var m = 'paper';
            try { m = localStorage.getItem('wt-mode') || 'paper'; } catch (e) {}
            document.documentElement.classList.toggle('dark', m === 'dark' || m === 'ice-night');
        }
        applyTheme();
        window.addEventListener('storage', function (e) { if (e.key === 'wt-mode') applyTheme(); });
    </script>
</head>

<body class="bg-cream text-charcoal font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Icon Components (Inline SVGs for self-containment) ---
        const SVGIcon = ({ d, size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: d }} />
        );
        const IconBook = (p) => <SVGIcon {...p} d='<path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>' />;
        const IconDownload = (p) => <SVGIcon {...p} d='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>' />;
        const IconUpload = (p) => <SVGIcon {...p} d='<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>' />;
        const IconDice = (p) => <SVGIcon {...p} d='<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="1.5" fill="currentColor" stroke="none"/>' />;
        const IconPlus = (p) => <SVGIcon {...p} d='<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>' />;
        const IconCheck = (p) => <SVGIcon {...p} d='<polyline points="20 6 9 17 4 12"/>' />;
        const IconTrash = (p) => <SVGIcon {...p} d='<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>' />;
        const IconGift = (p) => <SVGIcon {...p} d='<polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>' />;
        const IconFlame = (p) => <SVGIcon {...p} d='<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>' />;
        const IconTarget = (p) => <SVGIcon {...p} d='<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>' />;
        const IconX = (p) => <SVGIcon {...p} d='<path d="M18 6 6 18"/><path d="M6 6l12 12"/>' />;
        const IconPencil = (p) => <SVGIcon {...p} d='<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>' />;

        const locales = {
            en: {
                title: "Tsundoku Tamer", subtitle: "conquer your unread pile ✎", import: "Import", export: "Export",
                totalValue: "Total Unread Value", pileSize: "The Pile Size", waiting: "books waiting for you",
                pickForMe: "Pick For Me", cureParalysis: "cure decision paralysis", thePile: "The Pile", reading: "Reading", resolved: "Resolved",
                pileEmptyTitle: "Your pile is empty!", pileEmptyDesc: "You have conquered the Tsundoku.",
                unknownAuthor: "Unknown Author", inPileFor: "In pile for", days: "days", dusty: "🕸️ Dusty!",
                startReading: "Start Reading", letItGo: "Let it Go", notReading: "Not reading anything right now.",
                pickSomething: "Pick something from the pile!", finished: "Finished", backToPile: "Back to Pile",
                noResolved: "No resolved books yet.", read: "Read", letGo: "Let Go", addToPile: "Add to the Pile",
                bookTitle: "Book Title *", priceValue: "Price / Value (optional)", priceHint: "Optional — the price fuels the Guilt Meter.",
                cancel: "Cancel", addBook: "Add Book", fatesDecided: "The Fates Have Decided", by: "By",
                timeToRead: "It's time to read this! It's been waiting for", startReadingNow: "I'll Start Reading It Now",
                spinAgain: "Spin Again Later (Coward)", deleteConfirm: "Are you sure you want to permanently delete this record?",
                importSuccess: "Library successfully imported!", importInvalid: "Invalid file format.", importError: "Error parsing JSON file.",
                rouletteEmpty: "Your unread pile is empty! Time to buy more? (Just kidding!)", localStore: "Saved on your device",
                streak: "Reading Streak", streakUnit: "day streak", logToday: "I Read Today", loggedToday: "Logged ✓",
                yearlyGoal: "Yearly Goal", booksThisYear: "finished this year", goalSuffix: "books / yr",
                totalPages: "Total Pages (optional)", pagesHint: "Add a page count to track reading progress.",
                pagesOf: "of", pagesUnit: "pages", addPages: "+10 pages", editPage: "Edit page", promptPage: "What page are you on?"
            },
            id: {
                title: "Pawang Tsundoku", subtitle: "taklukkan tumpukan buku yang belum dibaca ✎", import: "Impor", export: "Ekspor",
                totalValue: "Total Nilai Buku Nganggur", pileSize: "Jumlah Tumpukan", waiting: "buku menunggumu",
                pickForMe: "Pilihin Dong", cureParalysis: "obat bingung milih", thePile: "Tumpukan", reading: "Dibaca", resolved: "Selesai",
                pileEmptyTitle: "Tumpukanmu kosong!", pileEmptyDesc: "Kamu berhasil menaklukkan Tsundoku.",
                unknownAuthor: "Penulis Anonim", inPileFor: "Nganggur selama", days: "hari", dusty: "🕸️ Karatan!",
                startReading: "Mulai Baca", letItGo: "Relakan", notReading: "Lagi nggak baca apa-apa nih.",
                pickSomething: "Pilih buku dari tumpukan gih!", finished: "Tamat", backToPile: "Balikin ke Tumpukan",
                noResolved: "Belum ada buku yang selesai.", read: "Tamat", letGo: "Direlakan", addToPile: "Tambah ke Tumpukan",
                bookTitle: "Judul Buku *", priceValue: "Harga / Nilai (opsional)", priceHint: "Opsional — nilai buku bikin Meteran Dosa makin sadis.",
                cancel: "Batal", addBook: "Tambah Buku", fatesDecided: "Takdir Telah Berkata", by: "Karya",
                timeToRead: "Waktunya baca ini! Udah nunggu selama", startReadingNow: "Oke, Mulai Baca Sekarang",
                spinAgain: "Nanti Aja Deh (Penakut)", deleteConfirm: "Yakin mau hapus buku ini permanen?",
                importSuccess: "Perpustakaan berhasil diimpor!", importInvalid: "Format file tidak valid.", importError: "Error membaca file JSON.",
                rouletteEmpty: "Tumpukanmu kosong! Waktunya beli buku? (Bercanda!)", localStore: "Tersimpan di perangkatmu",
                streak: "Streak Baca", streakUnit: "hari beruntun", logToday: "Aku Baca Hari Ini", loggedToday: "Tercatat ✓",
                yearlyGoal: "Target Tahunan", booksThisYear: "selesai tahun ini", goalSuffix: "buku / thn",
                totalPages: "Total Halaman (opsional)", pagesHint: "Isi jumlah halaman biar progress bacanya kelihatan.",
                pagesOf: "dari", pagesUnit: "halaman", addPages: "+10 halaman", editPage: "Ubah halaman", promptPage: "Sekarang halaman berapa?"
            }
        };

        const getRoast = (val, lang) => {
            const pick = (arr) => arr[Math.floor(val) % arr.length];
            if (lang === 'en') {
                if (val === 0) return { r: "Spotless. Who are you trying to impress?", c: "Go buy a book, you deserve it.", color: "text-stone" };
                if (val <= 50) return { r: pick(["Cute pile. Just a weekend's work.", "A very respectable, manageable stack.", "Barely qualifies as Tsundoku."]), c: pick(["Pick up a book instead of your phone tonight.", "You can finish this in a week if you try.", "Read a chapter before bed."]), color: "text-green-600" };
                if (val <= 150) return { r: pick(["It's getting real. The bookshelf is groaning.", "Your nightstand is looking like a leaning tower.", "Are you opening a small library?"]), c: pick(["Implement a 1-in-1-out policy.", "No more bookstores until you finish one.", "Time to dedicate your Sunday to reading."]), color: "text-yellow-600" };
                if (val <= 400) return { r: pick(["You're funding the publishing industry single-handedly.", "Do you even read, or just collect paper?", "That's an expensive hobby you're ignoring."]), c: pick(["Cancel your Amazon Prime. Immediately.", "Put your e-reader away and grab a physical book.", "Schedule 30 mins of reading every day."]), color: "text-orange-600" };
                return { r: pick(["Smaug the Dragon but with unread paperbacks.", "You have more unread books than a small town bookstore.", "Financial ruin, but make it literary."]), c: pick(["Delete shopping apps. Go live in the woods and read.", "Time for a ruthless purge. Sell them.", "Admit defeat and start giving them away."]), color: "text-accent" };
            } else {
                if (val === 0) return { r: "Tumben kosong. Lagi bokek ya?", c: "Boleh jajan buku satu. Mumpung gratis ongkir.", color: "text-stone" };
                if (val <= 500000) return { r: pick(["Masih aman. Setara nongkrong di cafe 2-3 kali.", "Tumpukan wajar anak indie.", "Belum masuk kategori dosa besar."]), c: pick(["Malam ini kurangin scroll TikTok, mending baca.", "Beresin satu buku weekend ini bisa kali.", "Bawa bukumu pas lagi ngopi besok."]), color: "text-green-600" };
                if (val <= 1500000) return { r: pick(["Mulai numpuk nih bos. Ingat tagihan.", "Rak bukumu udah mulai nangis tuh.", "Awas rubuh tuh tumpukan di samping kasur."]), c: pick(["Stop buka keranjang oren. Puasa jajan buku.", "Mulai baca 10 halaman sebelum tidur.", "Jangan tergiur flash sale Gramedia."]), color: "text-yellow-600" };
                if (val <= 3000000) return { r: pick(["Buku dibeli cuma buat pajangan aesthetic kamar ya?", "Niatnya literasi, realitanya cuma koleksi.", "Fix kamu butuh intervensi keuangan."]), c: pick(["Coba ikut bedah buku biar termotivasi.", "Unfollow akun diskon buku sekarang.", "Jatah jajan bulan ini mending ditabung."]), color: "text-orange-600" };
                return { r: pick(["Toko buku cabang rumah. Duit segitu mending buat DP motor.", "Kamu nimbun buku apa nimbun dosa?", "Mending buka perpustakaan sekalian."]), c: pick(["Tobat. Jualin yang debuan di Carousell.", "Stop. Berhenti. Jangan beli apa-apa lagi.", "Relakan saja, sumbangin ke panti asuhan."]), color: "text-accent" };
            }
        };

        const todayKey = () => new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD, local time

        const App = () => {
            const [books, setBooks] = useState(() => {
                try { return JSON.parse(localStorage.getItem('tsundoku-books')) || []; } catch (e) { return []; }
            });
            const [readLog, setReadLog] = useState(() => {
                try { return JSON.parse(localStorage.getItem('tsundoku-readlog')) || []; } catch (e) { return []; }
            });
            const [goal, setGoal] = useState(() => {
                const saved = parseInt(localStorage.getItem('tsundoku-goal'));
                return saved > 0 ? saved : 12;
            });

            const [isAddModalOpen, setIsAddModalOpen] = useState(false);
            const [newBook, setNewBook] = useState({ title: '', author: '', price: '', totalPages: '' });
            const [rouletteBook, setRouletteBook] = useState(null);
            const [activeTab, setActiveTab] = useState('unread'); // unread, reading, resolved

            const [language, setLanguage] = useState(() => localStorage.getItem('tsundoku-language') || 'en');

            const fileInputRef = useRef(null);

            useEffect(() => { localStorage.setItem('tsundoku-books', JSON.stringify(books)); }, [books]);
            useEffect(() => { localStorage.setItem('tsundoku-readlog', JSON.stringify(readLog)); }, [readLog]);
            useEffect(() => { localStorage.setItem('tsundoku-goal', String(goal)); }, [goal]);
            useEffect(() => { localStorage.setItem('tsundoku-language', language); }, [language]);

            const t = locales[language];
            const currency = language === 'id' ? 'Rp' : '$';
            const decimals = language === 'id' ? 0 : 2;
            const currentYear = new Date().getFullYear();

            const unreadBooks = books.filter(b => b.status === 'unread');
            const readingBooks = books.filter(b => b.status === 'reading');
            const resolvedBooks = books.filter(b => b.status === 'finished' || b.status === 'donated');
            const finishedThisYear = resolvedBooks.filter(b => b.status === 'finished' && b.dateFinished && new Date(b.dateFinished).getFullYear() === currentYear).length;

            const totalGuilt = unreadBooks.reduce((sum, book) => sum + (Number(book.price) || 0), 0);
            const roastData = getRoast(totalGuilt, language);

            const streak = useMemo(() => {
                const days = new Set(readLog);
                let count = 0;
                let d = new Date();
                while (days.has(d.toLocaleDateString('en-CA'))) {
                    count++;
                    d.setDate(d.getDate() - 1);
                }
                return count;
            }, [readLog]);
            const loggedToday = readLog.includes(todayKey());

            const logToday = () => {
                setReadLog(prev => prev.includes(todayKey()) ? prev : [...prev, todayKey()]);
            };

            const handleAddBook = (e) => {
                e.preventDefault();
                if (!newBook.title.trim()) return;

                const bookEntry = {
                    id: crypto.randomUUID(),
                    title: newBook.title.trim(),
                    author: newBook.author.trim(),
                    price: parseFloat(newBook.price) || 0,
                    totalPages: parseInt(newBook.totalPages) || 0,
                    currentPage: 0,
                    dateAdded: Date.now(),
                    status: 'unread'
                };

                setBooks(prev => [bookEntry, ...prev]);
                setNewBook({ title: '', author: '', price: '', totalPages: '' });
                setIsAddModalOpen(false);
            };

            const updateBookStatus = (id, newStatus) => {
                setBooks(prev => prev.map(book =>
                    book.id === id ? { ...book, status: newStatus, ...(newStatus === 'finished' ? { dateFinished: Date.now() } : {}) } : book
                ));
                if (newStatus === 'finished') logToday();
            };

            const addPages = (id) => {
                setBooks(prev => prev.map(book => {
                    if (book.id !== id) return book;
                    const cap = book.totalPages > 0 ? book.totalPages : Infinity;
                    return { ...book, currentPage: Math.min(cap, (Number(book.currentPage) || 0) + 10) };
                }));
                logToday();
            };

            const editPage = (id, totalPages) => {
                const val = prompt(t.promptPage, '0');
                if (val === null) return;
                const page = Math.max(0, parseInt(val) || 0);
                setBooks(prev => prev.map(book =>
                    book.id === id ? { ...book, currentPage: totalPages > 0 ? Math.min(totalPages, page) : page } : book
                ));
                logToday();
            };

            const deleteBook = (id) => {
                if (confirm(t.deleteConfirm)) {
                    setBooks(prev => prev.filter(book => book.id !== id));
                }
            };

            const exportData = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(books));
                const downloadNode = document.createElement('a');
                downloadNode.setAttribute("href", dataStr);
                downloadNode.setAttribute("download", `tsundoku_backup_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(downloadNode);
                downloadNode.click();
                downloadNode.remove();
            };

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedBooks = JSON.parse(event.target.result);
                        if (Array.isArray(importedBooks)) {
                            setBooks(importedBooks.map(b => ({ totalPages: 0, currentPage: 0, ...b })));
                            alert(t.importSuccess);
                        } else {
                            alert(t.importInvalid);
                        }
                    } catch (err) {
                        alert(t.importError);
                    }
                };
                reader.readAsText(file);
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const triggerRoulette = () => {
                if (unreadBooks.length === 0) {
                    alert(t.rouletteEmpty);
                    return;
                }
                const randomIndex = Math.floor(Math.random() * unreadBooks.length);
                setRouletteBook(unreadBooks[randomIndex]);
            };

            const getDaysInPile = (timestamp) => Math.floor((Date.now() - timestamp) / (1000 * 60 * 60 * 24));

            const TabBtn = ({ mode, label, count }) => (
                <button
                    onClick={() => setActiveTab(mode)}
                    className={`flex-1 py-2.5 text-xs font-bold uppercase tracking-widest rounded-full transition ${activeTab === mode ? 'bg-charcoal text-cream shadow-sm' : 'text-stone hover:text-charcoal'}`}
                >
                    {label} ({count})
                </button>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <main className="max-w-4xl mx-auto px-6 py-10 md:py-14 flex-1 w-full">

                        {/* Header */}
                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10 pb-8 border-b border-cream-dark">
                            <div>
                                <h1 className="text-4xl md:text-5xl font-bold text-charcoal flex items-center gap-3">
                                    <IconBook size={30} className="text-earth" /> {t.title}
                                </h1>
                                <p className="serif text-2xl text-earth mt-1" style={{ transform: 'rotate(-1deg)' }}>{t.subtitle}</p>
                            </div>
                            <div className="flex items-center gap-2 flex-wrap">
                                <select
                                    value={language}
                                    onChange={(e) => setLanguage(e.target.value)}
                                    className="bg-surface border border-cream-dark text-charcoal-mid rounded-full px-4 py-2.5 text-[10px] font-bold uppercase tracking-widest outline-none cursor-pointer focus:border-earth transition"
                                >
                                    <option value="en">English ($)</option>
                                    <option value="id">Bahasa (Rp)</option>
                                </select>
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 px-4 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest bg-surface border border-cream-dark text-charcoal-mid hover:border-earth transition">
                                    <IconUpload size={14} /> {t.import}
                                </button>
                                <input type="file" accept=".json" className="hidden" ref={fileInputRef} onChange={handleImport} />
                                <button onClick={exportData} className="flex items-center gap-2 px-4 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest bg-surface border border-cream-dark text-charcoal-mid hover:border-earth transition">
                                    <IconDownload size={14} /> {t.export}
                                </button>
                            </div>
                        </div>

                        {/* Guilt Meter row */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div className="bg-surface p-6 rounded-3xl border border-cream-dark shadow-sm flex flex-col justify-center items-center text-center">
                                <span className="text-stone font-bold uppercase tracking-widest text-[10px] mb-1">{t.totalValue}</span>
                                <span className="text-4xl font-black text-charcoal">
                                    {currency}{totalGuilt.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals })}
                                </span>
                                <div className="mt-3 flex flex-col gap-1 items-center">
                                    <span className={`text-xs font-bold ${roastData.color}`}>{roastData.r}</span>
                                    <span className="text-[11px] text-stone italic mt-1 bg-cream px-2 py-1 rounded-full">💡 {roastData.c}</span>
                                </div>
                            </div>
                            <div className="bg-surface p-6 rounded-3xl border border-cream-dark shadow-sm flex flex-col justify-center items-center text-center">
                                <span className="text-stone font-bold uppercase tracking-widest text-[10px] mb-1">{t.pileSize}</span>
                                <span className="text-4xl font-black text-charcoal">{unreadBooks.length}</span>
                                <span className="text-[11px] text-stone mt-2 font-medium">{t.waiting}</span>
                            </div>
                            <div className="bg-earth p-6 rounded-3xl shadow-sm flex flex-col justify-center items-center text-center text-cream cursor-pointer hover:bg-earth-dark transition-colors group" onClick={triggerRoulette}>
                                <IconDice size={26} className="mb-2 group-hover:scale-110 transition-transform" />
                                <span className="text-base font-bold">{t.pickForMe}</span>
                                <span className="text-[11px] opacity-80 mt-1">{t.cureParalysis}</span>
                            </div>
                        </div>

                        {/* Streak + Goal row */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
                            <div className="bg-surface p-6 rounded-3xl border border-cream-dark shadow-sm flex items-center justify-between gap-4">
                                <div>
                                    <span className="text-stone font-bold uppercase tracking-widest text-[10px] mb-1 flex items-center gap-1.5"><IconFlame size={12} className="text-accent" /> {t.streak}</span>
                                    <div className="flex items-baseline gap-2 mt-1">
                                        <span className="text-3xl font-black text-charcoal">{streak}</span>
                                        <span className="text-xs text-stone">{t.streakUnit}</span>
                                    </div>
                                </div>
                                <button
                                    onClick={logToday}
                                    disabled={loggedToday}
                                    className={`px-4 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest transition ${loggedToday ? 'bg-cream-dark/60 text-stone cursor-default' : 'bg-earth text-cream hover:bg-earth-dark'}`}
                                >
                                    {loggedToday ? t.loggedToday : t.logToday}
                                </button>
                            </div>
                            <div className="bg-surface p-6 rounded-3xl border border-cream-dark shadow-sm">
                                <div className="flex items-center justify-between mb-2">
                                    <span className="text-stone font-bold uppercase tracking-widest text-[10px] flex items-center gap-1.5"><IconTarget size={12} className="text-earth" /> {t.yearlyGoal}</span>
                                    <div className="flex items-center gap-1.5 text-[11px] text-stone">
                                        <input
                                            type="number" min="1" value={goal}
                                            onChange={(e) => setGoal(Math.max(1, parseInt(e.target.value) || 1))}
                                            className="w-12 text-center bg-cream border border-cream-dark rounded-lg text-xs font-bold text-charcoal outline-none focus:border-earth py-0.5"
                                        /> {t.goalSuffix}
                                    </div>
                                </div>
                                <div className="flex items-baseline gap-2 mb-2">
                                    <span className="text-3xl font-black text-charcoal">{finishedThisYear}</span>
                                    <span className="text-xs text-stone">/ {goal} {t.booksThisYear}</span>
                                </div>
                                <div className="h-2 bg-cream-dark rounded-full overflow-hidden">
                                    <div className="h-full bg-earth rounded-full transition-all" style={{ width: `${Math.min(100, (finishedThisYear / goal) * 100)}%` }}></div>
                                </div>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="flex gap-1 bg-cream-dark/50 p-1 rounded-full mb-6 w-full max-w-md mx-auto md:mx-0">
                            <TabBtn mode="unread" label={t.thePile} count={unreadBooks.length} />
                            <TabBtn mode="reading" label={t.reading} count={readingBooks.length} />
                            <TabBtn mode="resolved" label={t.resolved} count={resolvedBooks.length} />
                        </div>

                        {/* Content Area */}
                        <div className="space-y-4">
                            {/* UNREAD TAB */}
                            {activeTab === 'unread' && (
                                unreadBooks.length === 0 ? (
                                    <div className="text-center py-14 text-stone bg-surface border border-cream-dark rounded-3xl border-dashed">
                                        <IconCheck size={40} className="mx-auto mb-3 text-earth" />
                                        <p className="text-lg font-bold text-charcoal">{t.pileEmptyTitle}</p>
                                        <p className="text-sm">{t.pileEmptyDesc}</p>
                                    </div>
                                ) : (
                                    unreadBooks.map(book => (
                                        <div key={book.id} className="bg-surface p-5 rounded-2xl border border-cream-dark shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:border-earth/40 transition-colors">
                                            <div className="flex-1">
                                                <h3 className="font-bold text-charcoal text-lg">{book.title}</h3>
                                                <p className="text-stone text-sm">{book.author || t.unknownAuthor} • {currency}{book.price.toLocaleString(undefined, { minimumFractionDigits: decimals, maximumFractionDigits: decimals })}</p>
                                                <div className="mt-2 inline-flex items-center gap-1.5 px-2.5 py-1 bg-cream rounded-full text-[10px] font-bold uppercase tracking-widest text-stone">
                                                    <span>{t.inPileFor} {getDaysInPile(book.dateAdded)} {t.days}</span>
                                                    {getDaysInPile(book.dateAdded) > 90 && <span className="text-accent ml-1">{t.dusty}</span>}
                                                </div>
                                            </div>
                                            <div className="flex flex-wrap gap-2 w-full md:w-auto">
                                                <button onClick={() => updateBookStatus(book.id, 'reading')} className="flex-1 md:flex-none px-4 py-2 bg-earth/10 text-earth-dark hover:bg-earth/20 rounded-full text-xs font-bold uppercase tracking-widest transition-colors">
                                                    {t.startReading}
                                                </button>
                                                <button onClick={() => updateBookStatus(book.id, 'donated')} title="Give up without guilt" className="flex-1 md:flex-none px-4 py-2 bg-cream text-stone hover:bg-cream-dark border border-cream-dark rounded-full text-xs font-medium transition-colors flex items-center justify-center gap-1">
                                                    <IconGift size={14} /> {t.letItGo}
                                                </button>
                                            </div>
                                        </div>
                                    ))
                                )
                            )}

                            {/* READING TAB */}
                            {activeTab === 'reading' && (
                                readingBooks.length === 0 ? (
                                    <div className="text-center py-14 text-stone bg-surface border border-cream-dark rounded-3xl border-dashed">
                                        <p className="text-lg font-bold text-charcoal">{t.notReading}</p>
                                        <button onClick={() => setActiveTab('unread')} className="mt-2 text-earth hover:text-earth-dark underline font-medium">{t.pickSomething}</button>
                                    </div>
                                ) : (
                                    readingBooks.map(book => {
                                        const pct = book.totalPages > 0 ? Math.min(100, Math.round((book.currentPage / book.totalPages) * 100)) : null;
                                        return (
                                            <div key={book.id} className="bg-surface p-5 rounded-2xl border-l-4 border-l-earth border-y border-r border-cream-dark shadow-sm flex flex-col gap-4">
                                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                                                    <div>
                                                        <h3 className="font-bold text-charcoal text-lg">{book.title}</h3>
                                                        <p className="text-stone text-sm">{book.author || t.unknownAuthor}</p>
                                                    </div>
                                                    <div className="flex gap-2 w-full md:w-auto">
                                                        <button onClick={() => updateBookStatus(book.id, 'finished')} className="flex-1 md:flex-none px-4 py-2 bg-earth text-cream hover:bg-earth-dark rounded-full text-xs font-bold uppercase tracking-widest transition-colors flex items-center justify-center gap-1">
                                                            <IconCheck size={14} /> {t.finished}
                                                        </button>
                                                        <button onClick={() => updateBookStatus(book.id, 'unread')} className="flex-1 md:flex-none px-4 py-2 bg-cream text-stone hover:bg-cream-dark rounded-full text-xs font-medium transition-colors">
                                                            {t.backToPile}
                                                        </button>
                                                    </div>
                                                </div>
                                                {book.totalPages > 0 ? (
                                                    <div>
                                                        <div className="flex items-center justify-between text-[11px] text-stone font-bold uppercase tracking-widest mb-1.5">
                                                            <span>{book.currentPage} {t.pagesOf} {book.totalPages} {t.pagesUnit} · {pct}%</span>
                                                            <div className="flex items-center gap-2 normal-case tracking-normal">
                                                                <button onClick={() => addPages(book.id)} className="text-earth hover:text-earth-dark font-bold flex items-center gap-1"><IconPlus size={12} />{t.addPages}</button>
                                                                <button onClick={() => editPage(book.id, book.totalPages)} className="text-stone hover:text-charcoal" title={t.editPage}><IconPencil size={12} /></button>
                                                            </div>
                                                        </div>
                                                        <div className="h-2 bg-cream-dark rounded-full overflow-hidden">
                                                            <div className="h-full bg-earth rounded-full transition-all" style={{ width: `${pct}%` }}></div>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <button onClick={() => editPage(book.id, 0)} className="self-start text-[11px] text-earth hover:text-earth-dark font-bold uppercase tracking-widest flex items-center gap-1">
                                                        <IconPencil size={12} /> {t.editPage}
                                                    </button>
                                                )}
                                            </div>
                                        );
                                    })
                                )
                            )}

                            {/* RESOLVED TAB */}
                            {activeTab === 'resolved' && (
                                resolvedBooks.length === 0 ? (
                                    <div className="text-center py-14 text-stone bg-surface border border-cream-dark rounded-3xl border-dashed">
                                        <p className="text-lg font-bold text-charcoal">{t.noResolved}</p>
                                    </div>
                                ) : (
                                    resolvedBooks.map(book => (
                                        <div key={book.id} className="bg-surface p-5 rounded-2xl border border-cream-dark shadow-sm flex flex-col md:flex-row justify-between items-start md:items-center gap-4 opacity-75 hover:opacity-100 transition-opacity">
                                            <div>
                                                <h3 className="font-bold text-charcoal text-lg line-through decoration-stone/50">{book.title}</h3>
                                                <p className="text-stone text-sm">{book.author}</p>
                                                <span className={`inline-block mt-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-widest ${book.status === 'finished' ? 'bg-earth/10 text-earth-dark' : 'bg-accent/10 text-accent'}`}>
                                                    {book.status === 'finished' ? t.read : t.letGo}
                                                </span>
                                            </div>
                                            <button onClick={() => deleteBook(book.id)} className="p-2 text-stone hover:text-accent hover:bg-accent/10 rounded-full transition-colors">
                                                <IconTrash size={18} />
                                            </button>
                                        </div>
                                    ))
                                )
                            )}
                        </div>
                    </main>

                    {/* Local Storage Indicator */}
                    <div className="fixed bottom-4 left-4 z-40">
                        <div className="flex items-center gap-2 bg-surface text-stone border border-cream-dark px-3 py-2 rounded-full shadow-sm font-bold text-[10px] uppercase tracking-widest">
                            <IconCheck size={14} className="text-earth" />
                            {t.localStore}
                        </div>
                    </div>

                    {/* Floating Add Button */}
                    <button
                        onClick={() => setIsAddModalOpen(true)}
                        className="fixed bottom-8 right-8 bg-earth text-cream p-4 rounded-full shadow-xl hover:bg-earth-dark hover:scale-105 transition-all focus:outline-none focus:ring-4 focus:ring-earth/30 z-40"
                        title={t.addToPile}
                    >
                        <IconPlus size={22} />
                    </button>

                    {/* Add Book Modal */}
                    {isAddModalOpen && (
                        <div className="fixed inset-0 bg-charcoal/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <div className="bg-surface rounded-[2rem] p-8 w-full max-w-md shadow-2xl border border-cream-dark animate-slideUp">
                                <div className="flex justify-between items-center mb-5">
                                    <h2 className="text-2xl font-bold text-charcoal serif">{t.addToPile}</h2>
                                    <button onClick={() => setIsAddModalOpen(false)} className="text-stone hover:text-charcoal">
                                        <IconX size={22} />
                                    </button>
                                </div>
                                <form onSubmit={handleAddBook} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-stone uppercase tracking-widest mb-1.5">{t.bookTitle}</label>
                                        <input
                                            type="text"
                                            required
                                            autoFocus
                                            value={newBook.title}
                                            onChange={e => setNewBook({ ...newBook, title: e.target.value })}
                                            className="w-full px-4 py-2.5 bg-cream/40 border border-cream-dark rounded-xl focus:border-earth outline-none transition-shadow text-sm"
                                            placeholder="e.g. Dune / Cantik Itu Luka"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-stone uppercase tracking-widest mb-1.5">{t.priceValue}</label>
                                        <div className="relative">
                                            <span className="absolute left-4 top-2.5 text-stone text-sm">{currency}</span>
                                            <input
                                                type="number"
                                                step={decimals === 0 ? "1" : "0.01"}
                                                min="0"
                                                value={newBook.price}
                                                onChange={e => setNewBook({ ...newBook, price: e.target.value })}
                                                className="w-full pl-10 pr-4 py-2.5 bg-cream/40 border border-cream-dark rounded-xl focus:border-earth outline-none transition-shadow text-sm"
                                                placeholder={decimals === 0 ? "0" : "0.00"}
                                            />
                                        </div>
                                        <p className="text-[11px] text-stone mt-1">{t.priceHint}</p>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-stone uppercase tracking-widest mb-1.5">{t.totalPages}</label>
                                        <input
                                            type="number"
                                            min="0"
                                            value={newBook.totalPages}
                                            onChange={e => setNewBook({ ...newBook, totalPages: e.target.value })}
                                            className="w-full px-4 py-2.5 bg-cream/40 border border-cream-dark rounded-xl focus:border-earth outline-none transition-shadow text-sm"
                                            placeholder="e.g. 320"
                                        />
                                        <p className="text-[11px] text-stone mt-1">{t.pagesHint}</p>
                                    </div>
                                    <div className="pt-2 flex gap-3">
                                        <button type="button" onClick={() => setIsAddModalOpen(false)} className="flex-1 px-4 py-2.5 bg-cream text-charcoal-mid rounded-full font-bold text-xs uppercase tracking-widest hover:bg-cream-dark transition-colors">
                                            {t.cancel}
                                        </button>
                                        <button type="submit" className="flex-1 px-4 py-2.5 bg-earth text-cream rounded-full font-bold text-xs uppercase tracking-widest hover:bg-earth-dark transition-colors">
                                            {t.addBook}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Roulette Result Modal */}
                    {rouletteBook && (
                        <div className="fixed inset-0 bg-earth/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <div className="bg-surface rounded-[2rem] p-8 w-full max-w-md shadow-2xl text-center border border-cream-dark animate-slideUp">
                                <IconDice size={48} className="text-earth mx-auto mb-4" />
                                <h2 className="text-xs font-bold uppercase tracking-widest text-stone mb-2">{t.fatesDecided}</h2>
                                <h3 className="text-2xl font-black text-charcoal mb-1">{rouletteBook.title}</h3>
                                <p className="text-stone mb-6">{t.by} {rouletteBook.author || t.unknownAuthor}</p>

                                <div className="bg-earth/10 rounded-2xl p-4 mb-6 text-sm text-earth-dark font-medium">
                                    {t.timeToRead} {getDaysInPile(rouletteBook.dateAdded)} {t.days}.
                                </div>

                                <div className="flex flex-col gap-3">
                                    <button
                                        onClick={() => {
                                            updateBookStatus(rouletteBook.id, 'reading');
                                            setActiveTab('reading');
                                            setRouletteBook(null);
                                        }}
                                        className="w-full px-4 py-3 bg-earth text-cream rounded-full font-bold hover:bg-earth-dark transition-colors shadow-md"
                                    >
                                        {t.startReadingNow}
                                    </button>
                                    <button
                                        onClick={() => setRouletteBook(null)}
                                        className="w-full px-4 py-3 bg-cream text-stone rounded-full font-medium hover:bg-cream-dark transition-colors"
                                    >
                                        {t.spinAgain}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
