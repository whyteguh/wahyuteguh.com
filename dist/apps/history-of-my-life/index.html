<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History of My Life</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS via CDN. Palette bound to CSS variables so every class
         (bg-cream, text-charcoal, bg-earth/5, …) follows the site theme. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: 'rgb(var(--c-cream) / <alpha-value>)',
                        'cream-dark': 'rgb(var(--c-cream-dark) / <alpha-value>)',
                        earth: 'rgb(var(--c-earth) / <alpha-value>)',
                        'earth-light': 'rgb(var(--c-earth-light) / <alpha-value>)',
                        'earth-dark': 'rgb(var(--c-earth-dark) / <alpha-value>)',
                        charcoal: 'rgb(var(--c-charcoal) / <alpha-value>)',
                        'charcoal-mid': 'rgb(var(--c-charcoal-mid) / <alpha-value>)',
                        stone: 'rgb(var(--c-stone) / <alpha-value>)',
                        accent: 'rgb(var(--c-accent) / <alpha-value>)',
                        surface: 'rgb(var(--c-surface) / <alpha-value>)',
                    },
                    fontFamily: {
                        serif: ['Caveat', 'cursive'],
                        hand: ['Caveat', 'cursive'],
                        sans: ['Courier Prime', 'monospace'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel to transpile JSX in-browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --c-cream: 251 250 246;
            --c-cream-dark: 240 235 225;
            --c-earth: 139 111 71;
            --c-earth-light: 196 168 130;
            --c-earth-dark: 92 69 48;
            --c-charcoal: 43 41 37;
            --c-charcoal-mid: 74 69 64;
            --c-stone: 154 147 144;
            --c-accent: 179 67 43;
            --c-surface: 255 255 255;
        }

        html.dark {
            --c-cream: 27 25 21;
            --c-cream-dark: 69 63 52;
            --c-earth: 196 168 130;
            --c-earth-light: 214 190 150;
            --c-earth-dark: 214 190 150;
            --c-charcoal: 230 225 211;
            --c-charcoal-mid: 164 157 141;
            --c-stone: 124 118 106;
            --c-accent: 224 122 95;
            --c-surface: 55 51 43;
        }

        body {
            font-family: 'Courier Prime', monospace;
            background-color: rgb(var(--c-cream));
            color: rgb(var(--c-charcoal));
            background-image: radial-gradient(circle, rgba(139, 111, 71, 0.18) 1px, transparent 1.2px);
            background-size: 22px 22px;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        html.dark body {
            background-image: radial-gradient(circle, rgba(196, 168, 130, 0.12) 1px, transparent 1.2px);
        }

        .serif { font-family: 'Caveat', cursive; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgb(var(--c-cream)); }
        ::-webkit-scrollbar-thumb { background: rgb(var(--c-cream-dark)); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(var(--c-stone)); }
    </style>

    <!-- Theme: follow the parent site's mode (same-origin localStorage 'wt-mode') -->
    <script>
        function applyTheme() {
            var m = 'paper';
            try { m = localStorage.getItem('wt-mode') || 'paper'; } catch (e) {}
            document.documentElement.classList.toggle('dark', m === 'dark');
        }
        applyTheme();
        window.addEventListener('storage', function (e) { if (e.key === 'wt-mode') applyTheme(); });
    </script>
</head>

<body class="bg-cream text-charcoal font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const STORE_KEY = 'lifeTrackerData';
        const loadData = () => {
            try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch (e) { return {}; }
        };
        const persist = (data) => {
            try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch (e) {}
        };

        const SVGIcon = ({ d, size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: d }} />
        );
        const BookOpen = (p) => <SVGIcon {...p} d='<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>' />;
        const Calendar = (p) => <SVGIcon {...p} d='<rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/>' />;
        const Star = (p) => <SVGIcon {...p} d='<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>' />;
        const TrendingUp = (p) => <SVGIcon {...p} d='<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>' />;
        const TrendingDown = (p) => <SVGIcon {...p} d='<polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>' />;
        const Lightbulb = (p) => <SVGIcon {...p} d='<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.9 1.2 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>' />;
        const Heart = (p) => <SVGIcon {...p} d='<path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>' />;
        const Briefcase = (p) => <SVGIcon {...p} d='<rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' />;
        const Activity = (p) => <SVGIcon {...p} d='<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>' />;
        const Plus = (p) => <SVGIcon {...p} d='<line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/>' />;
        const Trash2 = (p) => <SVGIcon {...p} d='<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>' />;
        const Copy = (p) => <SVGIcon {...p} d='<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>' />;
        const Sparkles = (p) => <SVGIcon {...p} d='<path d="M12 3l1.9 5.6L19.5 10l-5.6 1.4L12 17l-1.9-5.6L4.5 10l5.6-1.4z"/>' />;
        const Grid = (p) => <SVGIcon {...p} d='<rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/>' />;
        const Pencil = (p) => <SVGIcon {...p} d='<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>' />;
        const X = (p) => <SVGIcon {...p} d='<path d="M18 6 6 18"/><path d="M6 6l12 12"/>' />;

        const LifeTracker = () => {
            const currentYear = new Date().getFullYear();

            const [lifeData, setLifeData] = useState(loadData);
            const [selectedYear, setSelectedYear] = useState(currentYear);
            const [viewMode, setViewMode] = useState('editor'); // 'editor' | 'summary'
            const initialYears = () => {
                const years = Object.keys(lifeData).map(Number).sort((a, b) => b - a);
                return years.length ? years : [currentYear];
            };
            const [displayedYears, setDisplayedYears] = useState(initialYears);
            const [newYearInput, setNewYearInput] = useState('');
            const [notification, setNotification] = useState('');
            const [deleteModal, setDeleteModal] = useState({ isOpen: false, year: null });
            const [promptModalOpen, setPromptModalOpen] = useState(false);

            const getFormDataForYear = (year, data) => ({
                theme: data[year]?.theme || '',
                highs: data[year]?.highs || '',
                lows: data[year]?.lows || '',
                lesson: data[year]?.lesson || '',
                career: data[year]?.career || '',
                relationships: data[year]?.relationships || '',
                health: data[year]?.health || '',
                rating: data[year]?.rating || 3
            });

            const [formData, setFormData] = useState(() => getFormDataForYear(currentYear, lifeData));

            const notify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 3000);
            };

            const handleYearSelect = (year) => {
                setSelectedYear(year);
                setFormData(getFormDataForYear(year, lifeData));
            };

            const updateFormAndSave = (updates) => {
                setFormData(prev => {
                    const newFormData = { ...prev, ...updates };
                    const newLifeData = { ...lifeData, [selectedYear]: newFormData };
                    setLifeData(newLifeData);
                    persist(newLifeData);
                    return newFormData;
                });
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                updateFormAndSave({ [name]: value });
            };

            const handleDeleteYear = (yearToDelete) => setDeleteModal({ isOpen: true, year: yearToDelete });
            const confirmDelete = () => {
                const yearToDelete = deleteModal.year;
                const newData = { ...lifeData };
                delete newData[yearToDelete];
                setLifeData(newData);
                persist(newData);

                const updatedYears = displayedYears.filter(y => y !== yearToDelete);
                if (updatedYears.length === 0) updatedYears.push(currentYear);
                setDisplayedYears(updatedYears);
                handleYearSelect(Math.max(...updatedYears));
                setDeleteModal({ isOpen: false, year: null });
            };

            const handleAddYear = (e) => {
                e.preventDefault();
                const yearToAdd = parseInt(newYearInput);
                if (yearToAdd && !displayedYears.includes(yearToAdd)) {
                    setDisplayedYears(prev => [...prev, yearToAdd].sort((a, b) => b - a));
                    handleYearSelect(yearToAdd);
                    setNewYearInput('');
                }
            };

            const handleAddPrevYear = () => {
                const prevYear = Math.min(...displayedYears) - 1;
                setDisplayedYears(prev => [...prev, prevYear].sort((a, b) => b - a));
                handleYearSelect(prevYear);
            };

            const getMoodEmoji = (rating) => {
                const emojis = { 1: '😭', 2: '😔', 3: '😐', 4: '😊', 5: '🤩' };
                return emojis[rating] || '😐';
            };

            const SummaryView = () => {
                const sortedYears = Object.keys(lifeData).sort((a, b) => b - a);
                if (sortedYears.length === 0) return <div className="text-center py-20 text-stone">Belum ada cerita yang dicatat.</div>;

                return (
                    <div className="space-y-12 animate-fadeIn">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            {sortedYears.map(year => (
                                <div key={year} className="bg-surface rounded-3xl p-8 border border-cream-dark shadow-sm hover:shadow-md transition-all group">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h3 className="text-4xl font-bold text-charcoal serif group-hover:text-earth transition-colors leading-none">{year}</h3>
                                            <p className="text-earth font-medium text-xs mt-1 uppercase tracking-widest">{lifeData[year].theme || "Tanpa Tema"}</p>
                                        </div>
                                        <div className="text-3xl grayscale group-hover:grayscale-0 transition-all">{getMoodEmoji(lifeData[year].rating)}</div>
                                    </div>
                                    <p className="text-stone text-sm italic line-clamp-3 mb-6">"{lifeData[year].lesson || "Belum ada pelajaran."}"</p>
                                    <button onClick={() => { handleYearSelect(Number(year)); setViewMode('editor'); }} className="text-[10px] font-bold uppercase tracking-widest text-charcoal hover:text-earth transition">Edit Cerita →</button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const PromptModal = () => {
                const promptText = `Tolong analisis riwayat hidupku berikut dan berikan insight mendalam tentang pola berulang, fase hidup, dan nasihat strategis dalam bahasa Indonesia yang elegan.

Data Riwayat Hidup:
${JSON.stringify(lifeData, null, 2)}

Analisis menggunakan struktur:
1. Pesan Inti (Core Insight)
2. Pola Berulang (Emosi, Finansial, Relasi)
3. Pemetaan Fase Hidup (Growth, Chaos, Recovery, Stable)
4. Blind Spot & Langkah Strategis Berikutnya.`;

                const copyToClipboard = () => {
                    const done = () => notify('Prompt berhasil disalin!');
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(promptText).then(done).catch(done);
                    } else {
                        const ta = document.createElement('textarea');
                        ta.value = promptText; document.body.appendChild(ta); ta.select();
                        try { document.execCommand('copy'); } catch (e) {}
                        document.body.removeChild(ta); done();
                    }
                };

                return (
                    <div className="fixed inset-0 bg-charcoal/40 backdrop-blur-sm flex items-center justify-center z-[100] p-6 animate-fadeIn">
                        <div className="bg-surface rounded-[2.5rem] shadow-2xl max-w-2xl w-full max-h-[80vh] flex flex-col animate-slideUp overflow-hidden border border-cream-dark">
                            <div className="p-8 border-b border-cream-dark flex justify-between items-center">
                                <h3 className="text-3xl font-bold text-charcoal serif">Salin Prompt Analisis</h3>
                                <button onClick={() => setPromptModalOpen(false)} className="text-stone hover:text-charcoal"><X size={24} /></button>
                            </div>
                            <div className="p-8 overflow-y-auto flex-1">
                                <p className="text-sm text-stone mb-4">Salin teks di bawah ini dan tempelkan ke AI pilihanmu (Claude, ChatGPT, atau Gemini) untuk mendapatkan analisis mendalam.</p>
                                <pre className="bg-cream p-6 rounded-2xl text-[11px] text-charcoal-mid whitespace-pre-wrap font-sans leading-relaxed border border-cream-dark">
                                    {promptText}
                                </pre>
                            </div>
                            <div className="p-8 bg-cream border-t border-cream-dark flex justify-end">
                                <button onClick={copyToClipboard} className="flex items-center gap-2 px-8 py-4 bg-accent text-cream rounded-full font-bold text-xs uppercase tracking-widest hover:bg-charcoal transition shadow-lg">
                                    <Copy size={16} /> Salin Teks
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const TabBtn = ({ mode, icon, label }) => (
                <button
                    onClick={() => setViewMode(mode)}
                    className={`flex items-center gap-2 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition ${viewMode === mode ? 'bg-charcoal text-cream shadow-sm' : 'text-stone hover:text-charcoal'}`}
                >
                    {icon} {label}
                </button>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <main className="max-w-6xl mx-auto px-6 py-10 md:py-14 flex-1 w-full">

                        {/* Header / toolbar */}
                        <div className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10 pb-8 border-b border-cream-dark">
                            <div>
                                <h1 className="text-4xl md:text-5xl font-bold text-charcoal flex items-center gap-3">
                                    <BookOpen size={30} className="text-earth" /> History of My Life
                                </h1>
                                <p className="serif text-2xl text-earth mt-1" style={{ transform: 'rotate(-1deg)' }}>an annual audit of your one wild life ✨</p>
                            </div>
                            <div className="flex items-center gap-2 flex-wrap">
                                <div className="flex items-center gap-1 bg-surface p-1 rounded-full border border-cream-dark">
                                    <TabBtn mode="editor" icon={<Pencil size={12} />} label="Editor" />
                                    <TabBtn mode="summary" icon={<Grid size={12} />} label="Summary" />
                                </div>
                                <button onClick={() => setPromptModalOpen(true)} className="flex items-center gap-2 px-4 py-2.5 rounded-full text-[10px] font-bold uppercase tracking-widest bg-earth text-cream hover:bg-earth-dark transition shadow-sm">
                                    <Sparkles size={12} /> Analisis AI
                                </button>
                            </div>
                        </div>

                        <div className="flex flex-col lg:flex-row gap-12">
                            {viewMode === 'editor' && (
                                <aside className="w-full lg:w-48 flex-shrink-0">
                                    <div className="lg:sticky lg:top-8">
                                        <h2 className="text-[10px] font-bold text-stone uppercase tracking-widest mb-6 flex items-center gap-2"><Calendar size={12} /> Timeline</h2>
                                        <div className="space-y-2 max-h-[50vh] overflow-y-auto pr-2">
                                            {displayedYears.map(year => {
                                                const hasData = !!lifeData[year];
                                                return (
                                                    <div key={year} className="group flex items-center gap-2">
                                                        <button onClick={() => handleYearSelect(year)} className={`flex-1 text-left px-4 py-3 rounded-xl transition text-sm font-bold border ${selectedYear === year ? 'bg-surface border-earth text-charcoal shadow-sm' : 'border-transparent text-stone hover:bg-surface/50'}`}>
                                                            <div className="flex items-center justify-between">
                                                                <span>{year}</span>
                                                                {hasData && selectedYear !== year && <div className="w-1.5 h-1.5 rounded-full bg-earth/40"></div>}
                                                            </div>
                                                        </button>
                                                        {year !== currentYear && (
                                                            <button onClick={() => handleDeleteYear(year)} className="p-2 text-stone hover:text-accent opacity-0 group-hover:opacity-100 transition"><Trash2 size={14} /></button>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="mt-8 pt-6 border-t border-cream-dark space-y-4">
                                            <button onClick={handleAddPrevYear} className="w-full text-center py-2 text-[10px] font-bold uppercase tracking-widest text-earth hover:text-earth-dark transition">+ {Math.min(...displayedYears) - 1}</button>
                                            <form onSubmit={handleAddYear} className="relative">
                                                <input type="number" value={newYearInput} onChange={(e) => setNewYearInput(e.target.value)} placeholder="Tahun..." className="w-full pl-4 pr-10 py-2 bg-surface/50 border border-cream-dark rounded-full text-xs outline-none focus:border-earth transition" />
                                                <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 text-earth"><Plus size={16} /></button>
                                            </form>
                                        </div>
                                    </div>
                                </aside>
                            )}

                            <section className="flex-1 min-w-0">
                                {viewMode === 'summary' ? <SummaryView /> : (
                                    <div className="bg-surface rounded-[2.5rem] border border-cream-dark p-8 md:p-16 shadow-sm animate-fadeIn">
                                        <div className="flex flex-col md:flex-row md:items-end justify-between mb-16 gap-8">
                                            <div>
                                                <span className="text-[10px] font-bold text-earth uppercase tracking-[0.3em] mb-4 block">Annual Audit</span>
                                                <h2 className="text-7xl font-bold text-charcoal serif leading-none">{selectedYear}</h2>
                                            </div>
                                            <div className="flex flex-col items-start md:items-end gap-4">
                                                <label className="text-[10px] font-bold text-stone uppercase tracking-widest">Life Satisfaction</label>
                                                <div className="flex gap-2 md:gap-4 bg-cream p-2 rounded-full border border-cream-dark">
                                                    {[1, 2, 3, 4, 5].map(v => (
                                                        <button key={v} onClick={() => updateFormAndSave({ rating: v })} className={`text-2xl w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-full transition-all ${formData.rating === v ? 'bg-surface shadow-lg scale-110' : 'opacity-40 grayscale hover:opacity-100 hover:grayscale-0'}`}>
                                                            {getMoodEmoji(v)}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-16">
                                            <div className="space-y-4">
                                                <label className="text-xs font-bold text-stone uppercase tracking-widest flex items-center gap-2"><BookOpen size={14} className="text-earth" /> Tema Utama</label>
                                                <input type="text" name="theme" value={formData.theme} onChange={handleInputChange} placeholder="Apa tema besar tahun ini?" className="w-full px-0 py-4 bg-transparent border-b border-cream-dark text-4xl serif text-charcoal focus:border-earth outline-none transition" />
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                                <div className="space-y-4">
                                                    <label className="text-xs font-bold text-stone uppercase tracking-widest flex items-center gap-2"><TrendingUp size={14} className="text-earth" /> Highs</label>
                                                    <textarea name="highs" value={formData.highs} onChange={handleInputChange} rows="4" className="w-full p-6 bg-cream/40 border border-cream-dark rounded-3xl focus:border-earth outline-none transition text-sm leading-relaxed resize-none"></textarea>
                                                </div>
                                                <div className="space-y-4">
                                                    <label className="text-xs font-bold text-stone uppercase tracking-widest flex items-center gap-2"><TrendingDown size={14} className="text-accent" /> Lows</label>
                                                    <textarea name="lows" value={formData.lows} onChange={handleInputChange} rows="4" className="w-full p-6 bg-cream/40 border border-cream-dark rounded-3xl focus:border-accent outline-none transition text-sm leading-relaxed resize-none"></textarea>
                                                </div>
                                            </div>

                                            <div className="space-y-4">
                                                <label className="text-xs font-bold text-stone uppercase tracking-widest flex items-center gap-2"><Lightbulb size={14} className="text-earth" /> Pelajaran Berharga</label>
                                                <textarea name="lesson" value={formData.lesson} onChange={handleInputChange} rows="3" className="w-full p-8 bg-earth/5 border border-earth/10 rounded-3xl focus:border-earth outline-none text-2xl serif italic leading-relaxed resize-none text-charcoal"></textarea>
                                            </div>

                                            <div className="pt-12 border-t border-cream-dark grid grid-cols-1 md:grid-cols-3 gap-8">
                                                {[{n:'career', l:'Career', i:<Briefcase size={14}/>}, {n:'relationships', l:'Social', i:<Heart size={14}/>}, {n:'health', l:'Health', i:<Activity size={14}/>}].map(f => (
                                                    <div key={f.n} className="space-y-3">
                                                        <label className="text-[10px] font-bold text-stone uppercase tracking-widest flex items-center gap-2">{f.i} {f.l}</label>
                                                        <textarea name={f.n} value={formData[f.n]} onChange={handleInputChange} rows="3" className="w-full p-4 bg-cream/40 border border-cream-dark rounded-2xl focus:border-earth outline-none text-xs transition resize-none"></textarea>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </section>
                        </div>
                    </main>

                    {/* Notification Toast */}
                    {notification && (
                        <div className="fixed bottom-12 left-1/2 -translate-x-1/2 px-8 py-4 bg-charcoal text-cream rounded-full text-xs font-bold uppercase tracking-widest shadow-2xl animate-slideUp z-[200]">
                            {notification}
                        </div>
                    )}

                    {/* Delete Modal */}
                    {deleteModal.isOpen && (
                        <div className="fixed inset-0 bg-charcoal/40 backdrop-blur-sm flex items-center justify-center z-[100] p-6 animate-fadeIn">
                            <div className="bg-surface rounded-[2.5rem] shadow-2xl max-w-sm w-full overflow-hidden animate-slideUp border border-cream-dark">
                                <div className="p-10 text-center">
                                    <div className="w-20 h-20 rounded-full bg-accent/10 text-accent flex items-center justify-center mb-8 mx-auto"><Trash2 size={40} /></div>
                                    <h3 className="text-4xl font-bold text-charcoal serif mb-4">Hapus {deleteModal.year}?</h3>
                                    <p className="text-stone text-sm leading-relaxed">Catatan tahun ini akan dihapus permanen dari peramban ini.</p>
                                </div>
                                <div className="bg-cream px-10 py-8 flex flex-col gap-4">
                                    <button onClick={confirmDelete} className="w-full py-4 bg-accent text-cream rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-charcoal transition">Hapus Sekarang</button>
                                    <button onClick={() => setDeleteModal({ isOpen: false, year: null })} className="w-full py-4 text-stone font-bold text-[10px] uppercase tracking-widest hover:text-charcoal transition">Batalkan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Prompt Modal */}
                    {promptModalOpen && <PromptModal />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<LifeTracker />);
    </script>
</body>
</html>
