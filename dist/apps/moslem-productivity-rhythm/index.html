    <script>
        function applyTheme() {
            var m = 'paper';
            try { m = localStorage.getItem('wt-mode') || 'paper'; } catch (e) {}
            document.documentElement.classList.toggle('dark', m === 'dark');
            window.dispatchEvent(new Event('theme-changed'));
        }
        applyTheme();
        window.addEventListener('storage', function (e) { if (e.key === 'wt-mode') applyTheme(); });

        // --- DICTIONARY (i18n) ---

                b_workout: "Workout / Physical Activity",
                b_dhuha: "Dhuha Prayer & Morning Break",
                b_tahajjud: "Qiyamullail / Morning Prep",
                b_family: "Family / Relax Time",
                b_transition: "Transition / Break",
                b_shallow: "Shallow Work",
                b_focusMorning: "Morning Focus",
                b_focusDeep: "Deep Work",

                // Energies
                e_peak: "Peak - Blessed & Analytical Time",
                e_trough: "Trough - Collaboration & Admin",
                e_rebound: "Rebound - Routine Tasks",
                e_low: "Low - Relaxation",
                e_spiritual: "Peak Spiritual",

                t_peak: "Utilize the morning blessings. Remove distractions, tackle the biggest task.",
                t_trough: "Hold meetings, reply to messages, or do administrative tasks.",
                t_break: "Leave your desk. Light Dhikr, drink water, or make Wudu to refresh.",
                t_qailulah: "\"Take a qailulah, for the devils do not take qailulah.\" - Tabarani"

        // --- UTILITY FUNCTIONS ---
        const timeToMins = (timeStr) => {
            if (!timeStr) return 0;
            const parts = timeStr.split(':');
            return (Number(parts[0]) || 0) * 60 + (Number(parts[1]) || 0);
        };

        const minsToTime = (mins) => {
            if (isNaN(mins)) return '00:00';
            const normalizedMins = ((mins % 1440) + 1440) % 1440;
            const hours = Math.floor(normalizedMins / 60).toString().padStart(2, '0');
            const minutes = (normalizedMins % 60).toString().padStart(2, '0');
            return `${hours}:${minutes}`;
        };

        const getEnergyLevel = (timeMins, t) => {
            const realMins = timeMins % 1440;
            if (realMins >= timeToMins('05:00') && realMins < timeToMins('12:00')) return t.e_peak;
            if (realMins >= timeToMins('12:00') && realMins < timeToMins('15:00')) return t.e_trough;
            if (realMins >= timeToMins('15:00') && realMins < timeToMins('18:00')) return t.e_rebound;
            return t.e_low;
        };

        const getBlockColor = (type, energyStr, t) => {
            if (type === 'prayer') return 'border-emerald-500 bg-emerald-50 text-emerald-900 shadow-emerald-100 dark:bg-emerald-900/30 dark:border-emerald-600 dark:text-emerald-100 dark:shadow-none';
            if (type === 'sunnah') return 'border-teal-500 bg-teal-50 text-teal-900 shadow-teal-100 dark:bg-teal-900/30 dark:border-teal-600 dark:text-teal-100 dark:shadow-none';
            if (type === 'workout') return 'border-orange-500 bg-orange-50 text-orange-900 shadow-orange-100 dark:bg-orange-900/30 dark:border-orange-600 dark:text-orange-100 dark:shadow-none';
            if (type === 'meal') return 'border-pink-400 bg-pink-50 text-pink-900 shadow-pink-100 dark:bg-pink-900/30 dark:border-pink-600 dark:text-pink-100 dark:shadow-none';
            if (type === 'break') return 'border-amber-400 bg-amber-50 text-amber-900 shadow-amber-100 dark:bg-amber-900/30 dark:border-amber-600 dark:text-amber-100 dark:shadow-none';
            if (type === 'winddown') return 'border-slate-400 bg-cream dark:bg-charcoal text-charcoal dark:text-cream shadow-slate-100 dark:border-slate-600 dark:text-slate-300 dark:shadow-none';
            if (type === 'sleep') return 'border-gray-800 bg-gray-100 text-gray-600 shadow-gray-200 dark:bg-gray-900 dark:border-gray-700 dark:text-gray-400 dark:shadow-none';
            if (type === 'shallow') return 'border-indigo-400 bg-indigo-50 text-indigo-900 shadow-indigo-100 dark:bg-indigo-900/30 dark:border-indigo-600 dark:text-indigo-200 dark:shadow-none';

            if (energyStr?.includes(t.e_peak.split(' ')[0])) return 'border-blue-500 bg-blue-50 text-blue-900 shadow-blue-100 dark:bg-blue-900/30 dark:border-blue-600 dark:text-blue-100 dark:shadow-none';
            if (energyStr?.includes(t.e_trough.split(' ')[0])) return 'border-violet-500 bg-violet-50 text-violet-900 shadow-violet-100 dark:bg-violet-900/30 dark:border-violet-600 dark:text-violet-100 dark:shadow-none';
            return 'border-cyan-500 bg-cyan-50 text-cyan-900 shadow-cyan-100 dark:bg-cyan-900/30 dark:border-cyan-600 dark:text-cyan-100 dark:shadow-none';
        };

        const getIcon = (type, energyStr, t) => {
            if (type === 'prayer') return <BookOpen className="w-5 h-5 text-emerald-600 dark:text-emerald-400" />;
            if (type === 'sunnah') return <Star className="w-5 h-5 text-teal-600 dark:text-teal-400" />;
            if (type === 'workout') return <Dumbbell className="w-5 h-5 text-orange-600 dark:text-orange-400" />;
            if (type === 'break' || type === 'meal') return <Coffee className="w-5 h-5 text-amber-600 dark:text-amber-400" />;
            if (type === 'sleep') return <Moon className="w-5 h-5 text-gray-600 dark:text-gray-400" />;
            if (type === 'winddown') return <Heart className="w-5 h-5 text-stone dark:text-stone" />;
            if (type === 'shallow') return <CheckCircle2 className="w-5 h-5 text-indigo-500 dark:text-indigo-400" />;

            if (energyStr?.includes(t.e_peak.split(' ')[0])) return <Zap className="w-5 h-5 text-blue-600 dark:text-blue-400" />;
            return <Activity className="w-5 h-5 text-violet-600 dark:text-violet-400" />;
        };

        // --- PERSISTENCE HELPERS ---
        const loadJSON = (key, fallback) => {
            try {
                const v = JSON.parse(localStorage.getItem(key));
                return v === null || v === undefined ? fallback : v;
            } catch (e) { return fallback; }
        };
        const saveJSON = (key, value) => {
            try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
        };

        const DEFAULT_SETTINGS = {
            wakeUp: '03:30',
            sleepTime: '21:30',
            workout: { enabled: true, time: '16:30', duration: 30 },
            dhuha: { enabled: true, time: '08:30', duration: 15 },
            prayers: { subuh: '04:30', dzuhur: '11:45', ashar: '15:00', maghrib: '17:40', isya: '18:50' }
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [lang, setLang] = useState(() => loadJSON('mpr-lang', 'ID'));
            const [theme, setTheme] = useState(document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            useEffect(() => {
                const handleThemeChange = () => setTheme(document.documentElement.classList.contains('dark') ? 'dark' : 'light');
                window.addEventListener('theme-changed', handleThemeChange);
                return () => window.removeEventListener('theme-changed', handleThemeChange);
            }, []);
            const t = dict[lang];

            const [settings, setSettings] = useState(() => {
                const saved = loadJSON('mpr-settings', {});
                return {
                    ...DEFAULT_SETTINGS,
                    ...saved,
                    workout: { ...DEFAULT_SETTINGS.workout, ...(saved.workout || {}) },
                    dhuha: { ...DEFAULT_SETTINGS.dhuha, ...(saved.dhuha || {}) },
                    prayers: { ...DEFAULT_SETTINGS.prayers, ...(saved.prayers || {}) }
                };
            });

            const [schedule, setSchedule] = useState([]);
            const [locationStatus, setLocationStatus] = useState('idle');

            // notes & reflection persist per calendar day
            const todayKey = new Date().toDateString();
            const [notes, setNotes] = useState(() => {
                const saved = loadJSON('mpr-day', {});
                return saved.date === todayKey ? (saved.notes || {}) : {};
            });
            const [reflection, setReflection] = useState(() => {
                const saved = loadJSON('mpr-day', {});
                return saved.date === todayKey ? (saved.reflection || '') : '';
            });
            const [copyStatus, setCopyStatus] = useState(false);
            const [isSunnahPanelOpen, setIsSunnahPanelOpen] = useState(false);

            useEffect(() => { saveJSON('mpr-lang', lang); }, [lang]);
            useEffect(() => { saveJSON('mpr-settings', settings); }, [settings]);
            useEffect(() => { saveJSON('mpr-day', { date: todayKey, notes, reflection }); }, [notes, reflection]);

            const [currentTime, setCurrentTime] = useState(() => {
                const now = new Date();
                return now.getHours() * 60 + now.getMinutes();
            });
            const [currentDateObj, setCurrentDateObj] = useState(new Date());

            useEffect(() => {
                const interval = setInterval(() => {
                    const now = new Date();
                    setCurrentTime(now.getHours() * 60 + now.getMinutes());
                    if (now.getHours() === 0 && now.getMinutes() === 0) {
                        setCurrentDateObj(now);
                    }
                }, 60000);
                return () => clearInterval(interval);
            }, []);

            const maghribMins = timeToMins(settings.prayers.maghrib);
            const shift = (tVal) => {
                const m = typeof tVal === 'string' ? timeToMins(tVal) : tVal;
                return m < maghribMins ? m + 1440 : m;
            };
            const shiftedCurrentTime = shift(currentTime);

            // Date Formatting
            const langCode = lang === 'ID' ? 'id-ID' : 'en-US';
            const date1 = new Date(currentDateObj);
            const date2 = new Date(currentDateObj);

            if (currentTime >= maghribMins) {
                date2.setDate(date2.getDate() + 1);
            } else {
                date1.setDate(date1.getDate() - 1);
            }

            const d1M = date1.getMonth(), d2M = date2.getMonth();
            const d1Y = date1.getFullYear(), d2Y = date2.getFullYear();

            let masehiDateStr = '';
            if (d1Y === d2Y && d1M === d2M) {
                masehiDateStr = `${date1.getDate()} - ${new Intl.DateTimeFormat(langCode, { day: 'numeric', month: 'long', year: 'numeric' }).format(date2)}`;
            } else if (d1Y === d2Y) {
                masehiDateStr = `${new Intl.DateTimeFormat(langCode, { day: 'numeric', month: 'long' }).format(date1)} - ${new Intl.DateTimeFormat(langCode, { day: 'numeric', month: 'long', year: 'numeric' }).format(date2)}`;
            } else {
                masehiDateStr = `${new Intl.DateTimeFormat(langCode, { day: 'numeric', month: 'long', year: 'numeric' }).format(date1)} - ${new Intl.DateTimeFormat(langCode, { day: 'numeric', month: 'long', year: 'numeric' }).format(date2)}`;
            }

            const hijriDateObj = new Date(currentDateObj);
            if (currentTime >= maghribMins) {
                hijriDateObj.setDate(hijriDateObj.getDate() + 1);
            }
            const hijriahDate = new Intl.DateTimeFormat(langCode + '-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(hijriDateObj) + ' H';

            const fetchPrayersByCoords = async (latitude, longitude) => {
                const timestamp = Math.floor(Date.now() / 1000);
                const res = await fetch(`https://api.aladhan.com/v1/timings/${timestamp}?latitude=${latitude}&longitude=${longitude}&method=20`);
                const data = await res.json();
                if (data.code === 200) {
                    const timings = data.data.timings;
                    setSettings(prev => ({
                        ...prev, prayers: { subuh: timings.Fajr, dzuhur: timings.Dhuhr, ashar: timings.Asr, maghrib: timings.Maghrib, isya: timings.Isha }
                    }));
                    setLocationStatus('success');
                    setTimeout(() => setLocationStatus('idle'), 3000);
                } else throw new Error("API failed");
            };

            const fetchLocationAndPrayers = () => {
                setLocationStatus('loading');
                const fallbackToIP = async () => {
                    try {
                        const ipRes = await fetch('https://get.geojs.io/v1/ip/geo.json');
                        const ipData = await ipRes.json();
                        await fetchPrayersByCoords(ipData.latitude, ipData.longitude);
                    } catch (err) { setLocationStatus('error'); }
                };
                try {
                    if (!navigator.geolocation) return fallbackToIP();
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            try { await fetchPrayersByCoords(position.coords.latitude, position.coords.longitude); }
                            catch (e) { setLocationStatus('error'); }
                        },
                        () => fallbackToIP(), { timeout: 5000 }
                    );
                } catch (err) { fallbackToIP(); }
            };

            const handleSettingChange = (category, key, value) => {
                if (category === 'prayers') setSettings(prev => ({ ...prev, prayers: { ...prev.prayers, [key]: value } }));
                else if (category === 'workout' || category === 'dhuha') setSettings(prev => ({ ...prev, [category]: { ...prev[category], [key]: value } }));
                else setSettings(prev => ({ ...prev, [key]: value }));
            };

            const generateSchedule = () => {
                let fixedBlocks = [];
                fixedBlocks.push({ start: maghribMins, end: maghribMins + 45, type: 'prayer', title: t.b_maghrib });
                let isyaStart = shift(settings.prayers.isya);
                fixedBlocks.push({ start: isyaStart, end: isyaStart + 30, type: 'prayer', title: t.b_isya });
                let sleepStart = shift(settings.sleepTime);
                let wakeStart = shift(settings.wakeUp);
                if (wakeStart < sleepStart) wakeStart += 1440;
                fixedBlocks.push({ start: sleepStart, end: wakeStart, type: 'sleep', title: t.b_sleep });
                let subuhStart = shift(settings.prayers.subuh);
                fixedBlocks.push({ start: subuhStart, end: subuhStart + 30, type: 'prayer', title: t.b_subuh });
                let dzuhurStart = shift(settings.prayers.dzuhur);
                fixedBlocks.push({ start: dzuhurStart - 25, end: dzuhurStart, type: 'sunnah', title: t.b_qailulah });
                fixedBlocks.push({ start: dzuhurStart, end: dzuhurStart + 60, type: 'prayer', title: t.b_dzuhur });
                let asharStart = shift(settings.prayers.ashar);
                fixedBlocks.push({ start: asharStart, end: asharStart + 30, type: 'prayer', title: t.b_ashar });

                if (settings.workout.enabled) {
                    let workoutStart = shift(settings.workout.time);
                    fixedBlocks.push({ start: workoutStart, end: workoutStart + (Number(settings.workout.duration) || 30), type: 'workout', title: t.b_workout });
                }
                if (settings.dhuha.enabled) {
                    let dhuhaStart = shift(settings.dhuha.time);
                    fixedBlocks.push({ start: dhuhaStart, end: dhuhaStart + (Number(settings.dhuha.duration) || 15), type: 'sunnah', title: t.b_dhuha });
                }

                fixedBlocks.sort((a, b) => a.start - b.start);
                let fullSchedule = [];

                const fillGap = (start, end) => {
                    let curr = start;
                    while (curr < end) {
                        let remaining = end - curr;
                        const realCurr = curr % 1440;

                        if (curr >= wakeStart && curr < shift(settings.prayers.subuh)) {
                            fullSchedule.push({ start: curr, end: end, type: 'sunnah', title: t.b_tahajjud, energy: t.e_spiritual });
                            break;
                        }
                        if (curr >= isyaStart && curr < sleepStart) {
                            fullSchedule.push({ start: curr, end: end, type: 'winddown', title: t.b_family, energy: t.e_low });
                            break;
                        }
                        let isBadaSubuh = curr >= shift(settings.prayers.subuh) && realCurr < timeToMins('07:30');

                        if (remaining <= 30) {
                            fullSchedule.push({ start: curr, end, type: 'break', title: t.b_transition });
                            break;
                        } else if (remaining <= 60 && !isBadaSubuh) {
                            fullSchedule.push({ start: curr, end, type: 'shallow', title: t.b_shallow, energy: getEnergyLevel(curr, t) });
                            break;
                        }

                        let focusDur = Math.min(90, remaining);
                        fullSchedule.push({ start: curr, end: curr + focusDur, type: 'focus', title: isBadaSubuh ? t.b_focusMorning : t.b_focusDeep, energy: getEnergyLevel(curr, t) });
                        curr += focusDur;
                        remaining = end - curr;

                        if (remaining > 0) {
                            let breakDur = Math.min(20, remaining);
                            fullSchedule.push({ start: curr, end: curr + breakDur, type: 'break', title: t.b_ultradianBreak });
                            curr += breakDur;
                        }
                    }
                };

                for (let i = 0; i < fixedBlocks.length; i++) {
                    let current = fixedBlocks[i];
                    if (i > 0) {
                        let prev = fixedBlocks[i - 1];
                        if (current.start > prev.end) fillGap(prev.end, current.start);
                    }
                    fullSchedule.push(current);
                }

                let last = fixedBlocks[fixedBlocks.length - 1];
                let nextMaghrib = maghribMins + 1440;
                if (last.end < nextMaghrib) fillGap(last.end, nextMaghrib);

                setSchedule(fullSchedule);
            };

            const handleExport = () => {
                let text = `# ${t.title}\n${masehiDateStr} | ${hijriahDate}\n\n`;
                schedule.forEach(block => {
                    text += `- [${minsToTime(block.start)} - ${minsToTime(block.end)}] ${block.title}\n`;
                    if (notes[block.start]) {
                        text += `  > Target/Todo: ${notes[block.start]}\n`;
                    }
                });
                text += `\n## ${t.reflection}\n${reflection || '-'}\n`;

                const markCopied = () => {
                    setCopyStatus(true);
                    setTimeout(() => setCopyStatus(false), 2000);
                };
                const legacyCopy = () => {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        markCopied();
                    } catch (err) { console.error('Failed to copy'); }
                    document.body.removeChild(textArea);
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).then(markCopied).catch(legacyCopy);
                } else legacyCopy();
            };

            useEffect(() => {
                generateSchedule();
            }, [settings, lang]);

            return (
                <div className="p-4 md:p-6 lg:p-8 max-w-7xl mx-auto">

                    {/* Top Action Bar */}
                    <div className="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                        <div className="flex items-center gap-3 text-sm font-medium opacity-80">
                            <Calendar className="w-5 h-5 text-blue-500" />
                            <div>
                                <div className={theme === 'dark' ? 'text-slate-200' : 'text-charcoal dark:text-cream'}>{masehiDateStr}</div>
                                <div className="text-xs opacity-75">{hijriahDate}</div>
                            </div>
                        </div>

                        <div className="flex items-center gap-2 bg-white dark:bg-charcoal-mid p-1 rounded-full shadow-sm border border-cream-dark dark:border-stone/20">
                            {/* Lang Toggle */}
                            <button
                                onClick={() => setLang(lang === 'ID' ? 'EN' : 'ID')}
                                className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs transition-colors hover:bg-cream-dark dark:hover:bg-stone/40"
                            >
                                <Globe className="w-3.5 h-3.5 opacity-70" />
                                <div className="flex items-center gap-1">
                                    <span className={lang === 'ID' ? 'font-bold' : 'font-normal opacity-50'}>ID</span>
                                    <span className="opacity-30">|</span>
                                    <span className={lang === 'EN' ? 'font-bold' : 'font-normal opacity-50'}>EN</span>
                                </div>
                            </button>
                        </div>
                    </div>

                    {/* Header */}
                    <div className="mb-8 text-center lg:text-left border-b border-cream-dark dark:border-stone/20 pb-6">
                        <h1 className="text-3xl lg:text-4xl font-bold flex items-center justify-center lg:justify-start gap-3">
                            <Activity className="w-8 h-8 text-emerald-600 dark:text-emerald-400" />
                            {t.title}
                        </h1>
                        <div className="hand text-2xl mt-1 text-accent" style={{ transform: 'rotate(-1deg)' }}>{t.tagline} ✨</div>
                        <p className="mt-2 text-lg opacity-70" dangerouslySetInnerHTML={{ __html: t.subtitle }}></p>
                    </div>

                    {/* Panel Tips Sunnah */}
                    <div className="mb-8 relative z-20">
                        <button
                            onClick={() => setIsSunnahPanelOpen(!isSunnahPanelOpen)}
                            className={`w-full flex items-center justify-between p-4 rounded-xl border shadow-sm transition-all hover:shadow-md text-left
                    ${theme === 'dark' ? 'bg-emerald-900/20 border-emerald-800/50' : 'bg-gradient-to-r from-teal-50 to-emerald-50 border-emerald-100'}`}
                        >
                            <div className="flex items-center gap-3 text-emerald-800 dark:text-emerald-300 font-semibold text-base md:text-lg">
                                <Star className="w-6 h-6 text-emerald-600 dark:text-emerald-400" />
                                {t.sunnahGuide}
                            </div>
                            <div className={`p-1 rounded-full shadow-sm text-emerald-600 dark:text-emerald-400 ${theme === 'dark' ? 'bg-charcoal' : 'bg-white'}`}>
                                {isSunnahPanelOpen ? <ChevronUp className="w-5 h-5" /> : <ChevronDown className="w-5 h-5" />}
                            </div>
                        </button>

                        {isSunnahPanelOpen && (
                            <div className={`mt-3 p-5 md:p-6 rounded-xl border shadow-sm transition-all duration-300 ${theme === 'dark' ? 'bg-charcoal-mid border-emerald-900/50' : 'bg-white border-emerald-100'}`}>
                                <ul className="space-y-4 text-sm md:text-base opacity-90 leading-relaxed">
                                    <li className="flex items-start gap-3"><AlertCircle className="w-5 h-5 mt-0.5 text-emerald-600 dark:text-emerald-500 flex-shrink-0" /><span dangerouslySetInnerHTML={{ __html: t.sunnah1 }}></span></li>
                                    <li className="flex items-start gap-3"><AlertCircle className="w-5 h-5 mt-0.5 text-emerald-600 dark:text-emerald-500 flex-shrink-0" /><span dangerouslySetInnerHTML={{ __html: t.sunnah2 }}></span></li>
                                    <li className="flex items-start gap-3"><AlertCircle className="w-5 h-5 mt-0.5 text-emerald-600 dark:text-emerald-500 flex-shrink-0" /><span dangerouslySetInnerHTML={{ __html: t.sunnah3 }}></span></li>
                                    <li className="flex items-start gap-3"><AlertCircle className="w-5 h-5 mt-0.5 text-emerald-600 dark:text-emerald-500 flex-shrink-0" /><span dangerouslySetInnerHTML={{ __html: t.sunnah4 }}></span></li>
                                    <li className="flex items-start gap-3"><AlertCircle className="w-5 h-5 mt-0.5 text-emerald-600 dark:text-emerald-500 flex-shrink-0" /><span dangerouslySetInnerHTML={{ __html: t.sunnah5 }}></span></li>
                                </ul>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">

                        {/* Left Panel: Settings */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className={`p-6 rounded-2xl shadow-sm border h-fit lg:sticky lg:top-8 z-10 ${theme === 'dark' ? 'bg-charcoal-mid border-stone/20' : 'bg-white border-cream-dark'}`}>
                                <div className="flex items-center justify-between mb-6">
                                    <h2 className="text-xl font-semibold flex items-center gap-2">
                                        <Clock className="w-5 h-5 opacity-60" /> {t.settings}
                                    </h2>
                                    <div className="flex flex-col items-end gap-1">
                                        <button onClick={fetchLocationAndPrayers} disabled={locationStatus === 'loading'} className={`flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-full transition-colors ${theme === 'dark' ? 'bg-blue-900/40 text-blue-300 hover:bg-blue-900/60' : 'bg-blue-50 text-blue-600 hover:bg-blue-100'}`}>
                                            {locationStatus === 'loading' ? <Loader2 className="w-3.5 h-3.5 animate-spin" /> : <MapPin className="w-3.5 h-3.5" />}
                                            {t.trackLocation}
                                        </button>
                                        {locationStatus === 'error' && <span className="text-[10px] font-medium text-red-500">{t.locFail}</span>}
                                        {locationStatus === 'success' && <span className="text-[10px] font-medium text-emerald-500">{t.locSuccess}</span>}
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium mb-1 opacity-80">{t.wakeUp}</label>
                                            <input type="time" value={settings.wakeUp} onChange={(e) => handleSettingChange('base', 'wakeUp', e.target.value)} className={`w-full rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-emerald-500 ${theme === 'dark' ? 'bg-charcoal border border-stone/30' : 'bg-cream border-cream-dark border'}`} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium mb-1 opacity-80">{t.sleepTime}</label>
                                            <input type="time" value={settings.sleepTime} onChange={(e) => handleSettingChange('base', 'sleepTime', e.target.value)} className={`w-full rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-emerald-500 ${theme === 'dark' ? 'bg-charcoal border border-stone/30' : 'bg-cream border-cream-dark border'}`} />
                                        </div>
                                    </div>

                                    {/* Sesi Olahraga */}
                                    <div className={`pt-4 border-t ${theme === 'dark' ? 'border-stone/20' : 'border-cream-dark'}`}>
                                        <div className="flex items-center justify-between mb-3">
                                            <h3 className="text-sm font-semibold flex items-center gap-2"><Dumbbell className="w-4 h-4 text-orange-500" /> {t.workout}</h3>
                                            <label className="relative inline-flex items-center cursor-pointer">
                                                <input type="checkbox" checked={settings.workout.enabled} onChange={(e) => handleSettingChange('workout', 'enabled', e.target.checked)} className="sr-only peer" />
                                                <div className="w-9 h-5 bg-cream-dark dark:bg-stone/40 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-cream-dark after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-orange-500"></div>
                                            </label>
                                        </div>
                                        {settings.workout.enabled && (
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-xs font-medium mb-1 opacity-70">{t.startTime}</label><input type="time" value={settings.workout.time} onChange={(e) => handleSettingChange('workout', 'time', e.target.value)} className={`w-full text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-orange-500 ${theme === 'dark' ? 'bg-charcoal border border-stone/30' : 'bg-cream border-cream-dark border'}`} /></div>
                                                <div><label className="block text-xs font-medium mb-1 opacity-70">{t.duration}</label><input type="number" min="10" step="5" value={settings.workout.duration} onChange={(e) => handleSettingChange('workout', 'duration', e.target.value)} className={`w-full text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-orange-500 ${theme === 'dark' ? 'bg-charcoal border border-stone/30' : 'bg-cream border-cream-dark border'}`} /></div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Sholat Dhuha */}
                                    <div className={`pt-4 border-t ${theme === 'dark' ? 'border-stone/20' : 'border-cream-dark'}`}>
                                        <div className="flex items-center justify-between mb-3">
                                            <h3 className="text-sm font-semibold flex items-center gap-2"><Star className="w-4 h-4 text-teal-500" /> {t.dhuha}</h3>
                                            <label className="relative inline-flex items-center cursor-pointer">
                                                <input type="checkbox" checked={settings.dhuha.enabled} onChange={(e) => handleSettingChange('dhuha', 'enabled', e.target.checked)} className="sr-only peer" />
                                                <div className="w-9 h-5 bg-cream-dark dark:bg-stone/40 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-cream-dark after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-teal-500"></div>
                                            </label>
                                        </div>
                                        {settings.dhuha.enabled && (
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-xs font-medium mb-1 opacity-70">{t.startTime}</label><input type="time" value={settings.dhuha.time} onChange={(e) => handleSettingChange('dhuha', 'time', e.target.value)} className={`w-full text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-500 ${theme === 'dark' ? 'bg-charcoal border border-stone/30' : 'bg-cream border-cream-dark border'}`} /></div>
                                                <div><label className="block text-xs font-medium mb-1 opacity-70">{t.duration}</label><input type="number" min="5" step="5" value={settings.dhuha.duration} onChange={(e) => handleSettingChange('dhuha', 'duration', e.target.value)} className={`w-full text-sm rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-teal-500 ${theme === 'dark' ? 'bg-charcoal border border-stone/30' : 'bg-cream border-cream-dark border'}`} /></div>
                                            </div>
                                        )}
                                    </div>

                                    <div className={`pt-4 border-t ${theme === 'dark' ? 'border-stone/20' : 'border-cream-dark'}`}>
                                        <h3 className="text-sm font-semibold mb-3 flex items-center gap-2"><BookOpen className="w-4 h-4 text-emerald-500" /> {t.fardhu}</h3>
                                        <div className="space-y-3">
                                            {Object.entries(settings.prayers).map(([prayer, time]) => (
                                                <div key={prayer} className="flex items-center justify-between">
                                                    <label className="text-sm capitalize opacity-80">{prayer}</label>
                                                    <input type="time" value={time} onChange={(e) => handleSettingChange('prayers', prayer, e.target.value)} className={`w-32 text-sm rounded-lg px-3 py-1.5 outline-none focus:ring-2 focus:ring-emerald-500 ${theme === 'dark' ? 'bg-charcoal border border-stone/30' : 'bg-cream border-cream-dark border'}`} />
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Right Panel: Timeline */}
                        <div className="lg:col-span-8">
                            <h2 className="text-xl font-semibold mb-6 flex items-center gap-2">
                                <Zap className="w-5 h-5 text-amber-500" /> {t.timeline}
                            </h2>

                            <div className={`relative border-l-2 ml-4 md:ml-6 space-y-4 pb-12 ${theme === 'dark' ? 'border-stone/20' : 'border-cream-dark'}`}>
                                {schedule.map((block, idx) => {
                                    const duration = block.end - block.start;
                                    const heightClass = duration > 60 ? 'py-5' : 'py-3';
                                    const isCurrentBlock = shiftedCurrentTime >= block.start && shiftedCurrentTime < block.end;

                                    return (
                                        <div key={idx} className="relative pl-6 md:pl-8 duration-200 group">
                                            <div className={`absolute -left-[10px] top-5 w-4 h-4 rounded-full border-4 shadow-sm z-10 transition-colors ${isCurrentBlock
                                                    ? 'bg-red-500 border-red-200 animate-pulse scale-125 dark:border-red-900'
                                                    : block.type === 'prayer'
                                                        ? 'bg-emerald-500 border-emerald-100 dark:border-emerald-900'
                                                        : theme === 'dark' ? 'bg-charcoal border-stone/30 group-hover:border-blue-500' : 'bg-white border-cream-dark group-hover:border-blue-400'
                                                }`}></div>

                                            <div className={`rounded-xl border-l-4 p-4 md:px-5 flex flex-col md:flex-row md:items-center gap-3 md:gap-6 ${isCurrentBlock ? (theme === 'dark' ? 'border-red-500 ring-2 ring-red-900/50 bg-red-900/20' : 'border-red-400 ring-2 ring-red-100 bg-red-50/50') : ''
                                                } ${getBlockColor(block.type, block.energy, t)} ${heightClass}`}>

                                                <div className="flex-shrink-0 font-mono text-sm md:text-base font-semibold opacity-90 min-w-[100px] md:min-w-[120px]">
                                                    {minsToTime(block.start)} - {minsToTime(block.end)}
                                                    <div className="text-xs font-normal opacity-70 mt-0.5 flex items-center gap-1">
                                                        <Clock className="w-3 h-3" /> {duration} mnt
                                                    </div>
                                                </div>

                                                <div className="flex-grow">
                                                    <div className="flex flex-wrap items-start justify-between gap-2">
                                                        <h4 className="font-bold flex items-center gap-2 text-base md:text-lg">
                                                            {getIcon(block.type, block.energy, t)}
                                                            {block.title}
                                                        </h4>
                                                        {isCurrentBlock && (
                                                            <span className={`inline-flex items-center gap-1.5 text-[10px] md:text-xs font-bold px-2.5 py-1 rounded-full border animate-pulse ${theme === 'dark' ? 'bg-red-900/40 text-red-300 border-red-800' : 'bg-red-100 text-red-700 border-red-200'}`}>
                                                                <span className="w-1.5 h-1.5 rounded-full bg-red-500"></span> {t.now}
                                                            </span>
                                                        )}
                                                    </div>

                                                    {['focus', 'shallow', 'workout', 'winddown'].includes(block.type) && (
                                                        <div className="mt-3 mb-1">
                                                            <input
                                                                type="text"
                                                                placeholder={t.targetPlaceholder}
                                                                value={notes[block.start] || ''}
                                                                onChange={(e) => setNotes({ ...notes, [block.start]: e.target.value })}
                                                                className={`w-full text-sm rounded-md px-3 py-2 outline-none transition-all ${theme === 'dark' ? 'bg-charcoal border border-stone/30 focus:ring-2 focus:ring-blue-500 text-slate-200 placeholder-slate-600' : 'bg-white/50 border border-cream-dark focus:ring-2 focus:ring-blue-400 focus:bg-white placeholder:text-stone'}`}
                                                            />
                                                        </div>
                                                    )}

                                                    {block.energy && !['winddown', 'shallow', 'sunnah', 'workout'].includes(block.type) && (
                                                        <p className="text-sm mt-1 opacity-80 font-medium">{t.physicalCondition} {block.energy}</p>
                                                    )}

                                                    {block.type === 'sunnah' && <p className="text-sm mt-1 text-teal-600 dark:text-teal-400 font-medium opacity-90">{t.sunnahReward}</p>}

                                                    {/* Custom Tips mapping */}
                                                    {block.type === 'focus' && block.energy?.includes(t.e_peak.split(' ')[0]) && <p className="text-xs mt-2 opacity-75">{t.t_peak}</p>}
                                                    {block.type === 'focus' && block.energy?.includes(t.e_trough.split(' ')[0]) && <p className="text-xs mt-2 opacity-75">{t.t_trough}</p>}
                                                    {block.type === 'break' && <p className="text-xs mt-1 opacity-75">{t.t_break}</p>}
                                                    {block.type === 'sunnah' && block.title === t.b_qailulah && <p className="text-xs mt-1 opacity-75 text-teal-600 dark:text-teal-400">{t.t_qailulah}</p>}
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}

                                <div className="relative pl-6 md:pl-8 mt-6">
                                    <div className={`absolute -left-[9px] top-2 w-4 h-4 rounded-full border-4 z-10 ${theme === 'dark' ? 'bg-slate-400 border-stone/20' : 'bg-charcoal-mid border-cream-dark'}`}></div>
                                    <h4 className="font-bold text-stone flex items-center gap-2">{t.nextMaghrib}</h4>
                                </div>

                                {/* Reflection Card */}
                                <div className="relative pl-6 md:pl-8 mt-8">
                                    <div className={`rounded-xl border shadow-sm p-5 transition-all focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent ${theme === 'dark' ? 'bg-charcoal-mid border-stone/20' : 'bg-white border-cream-dark'}`}>
                                        <h4 className="font-bold flex items-center gap-2 mb-3">
                                            <FileText className="w-5 h-5 text-blue-500" />
                                            {t.reflection}
                                        </h4>
                                        <textarea
                                            value={reflection}
                                            onChange={(e) => setReflection(e.target.value)}
                                            placeholder={t.reflectionPlaceholder}
                                            className={`w-full h-24 text-sm rounded-lg px-3 py-2 outline-none resize-none ${theme === 'dark' ? 'bg-charcoal border border-stone/30 text-slate-200' : 'bg-cream border border-cream-dark focus:bg-white'}`}
                                        ></textarea>
                                    </div>
                                </div>

                                <div className="relative pl-6 md:pl-8 mt-6 mb-8 flex justify-end">
                                    <button
                                        onClick={handleExport}
                                        className="flex items-center gap-2 px-5 py-3 rounded-xl text-sm font-semibold transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 bg-accent text-cream"
                                    >
                                        {copyStatus ? <Check className="w-5 h-5 text-emerald-400" /> : <Copy className="w-5 h-5" />}
                                        {copyStatus ? t.copied : t.exportBtn}
                                    </button>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
